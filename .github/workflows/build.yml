name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install GBDK
        run: |
          wget -q https://github.com/gbdk-2020/gbdk-2020/releases/latest/download/gbdk-linux64.tar.gz
          tar -xzf gbdk-linux64.tar.gz
          echo "$PWD/gbdk/bin" >> $GITHUB_PATH

      - name: Build ROM
        run: ./compile.sh

      - name: Copy ROM to play directory
        run: mkdir -p play/rom && cp main.gb play/rom/

      - name: Upload ROM artifact
        uses: actions/upload-artifact@v4
        with:
          name: skazka-gb
          path: main.gb

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./play

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
